<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión | Sistema Escolar</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

  <link rel="stylesheet" href="css/login.css" />
</head>

<body>
  <div class="login-wrapper d-flex align-items-center justify-content-center">
    <div class="login-card shadow-lg">
      <div class="login-brand text-center mb-4">
        <img src="img/logo.svg" alt="Logo del sistema" class="login-logo mb-2" />
        <h1 class="h4 fw-bold mb-0">Sistema Escolar</h1>
        <p class="text-muted small">Ingresa tus credenciales para continuar</p>
      </div>

      <form id="formLogin" novalidate>
        <div class="mb-3">
          <label for="correo" class="form-label">Correo electrónico</label>
          <div class="input-group has-validation">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="text" class="form-control" id="correo" placeholder="usuario@escuela.com"
              autocomplete="username" />
            <div class="invalid-feedback" id="errorCorreo">
              Ingresa un correo electrónico válido.
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <div class="input-group has-validation">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="Mínimo 8 caracteres"
              autocomplete="current-password" />
            <button class="btn btn-outline-secondary" type="button" id="btnVerPassword" tabindex="-1">
              <i class="bi bi-eye"></i>
            </button>
            <div class="invalid-feedback" id="errorPassword">
              Debe tener 8+ caracteres, mayúscula, minúscula, número y carácter especial.
            </div>
          </div>
        </div>

        <div id="mensajeLogin" class="alert alert-danger py-2 d-none" role="alert"></div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          Iniciar sesión
        </button>
      </form>


    </div>
  </div>


  <script src="js/utileria.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
